<!DOCTYPE html>
<html>
<head>
    <title>AI Website Compliance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            max-width: 1150px;
            margin: 50px auto;
            padding: 40px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        }

        h1 {
            margin-bottom: 20px;
        }

        .form-section input {
            padding: 12px;
            margin-right: 12px;
            width: 230px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            padding: 12px 25px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #3730a3;
            transform: translateY(-2px);
        }

        button.loading {
            background: #6b7280 !important;
            cursor: not-allowed;
        }

        button.loading::after {
            content: "";
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top: 2px solid transparent;
            border-radius: 50%;
            display: inline-block;
            margin-left: 10px;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .modules {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .modules input {
            display: none;
        }

        .pill {
            padding: 10px 18px;
            border-radius: 30px;
            background: #f1f5f9;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }

        .modules input:checked + .pill {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
            box-shadow: 0 4px 10px rgba(79,70,229,0.3);
        }

        .pill:hover {
            transform: translateY(-2px);
        }

        .summary-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            flex: 1;
            background: #f9fafb;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }

        .card h2 {
            margin: 10px 0;
            font-size: 28px;
        }

        /* ========================= */
        /* PERFECT CHART ALIGNMENT */
        /* ========================= */

        .charts {
            display: flex;
            justify-content: space-between;
            align-items: stretch; /* makes both same height */
            gap: 50px;
            margin-top: 30px;
        }

        .chart-box {
            flex: 1;
            background: #fafafa;
            padding: 25px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 420px; /* fixed equal height */
        }

        .chart-box canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .charts {
                flex-direction: column;
            }

            .chart-box {
                height: 380px;
            }
        }

        #report {
            margin-top: 40px;
            line-height: 1.6;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>AI Website Compliance Dashboard</h1>

    <div class="form-section">
        <input type="text" id="url" placeholder="Enter Website URL" />
        <input type="email" id="email" placeholder="Enter Email for Report" />
        <button id="auditBtn" onclick="runAudit()">Run Audit</button>
    </div>

    <h3>Select Audit Modules</h3>

    <div class="modules">
        <input type="checkbox" id="accessibility" value="accessibility">
        <label for="accessibility" class="pill">Accessibility (WCAG AA)</label>

        <input type="checkbox" id="security" value="security">
        <label for="security" class="pill">Security Posture Review</label>

        <input type="checkbox" id="privacy" value="privacy">
        <label for="privacy" class="pill">Privacy Compliance Review</label>

        <input type="checkbox" id="governance" value="governance">
        <label for="governance" class="pill">Governance & Policy Audit</label>

        <input type="checkbox" id="performance" value="performance">
        <label for="performance" class="pill">Performance Review</label>

        <input type="checkbox" id="iso27001" value="iso27001">
        <label for="iso27001" class="pill">ISO 27001 Control Mapping</label>
    </div>

    <div class="summary-cards">
        <div class="card">
            <span>Overall</span>
            <h2 id="overallScore">--%</h2>
        </div>
        <div class="card">
            <span>Grade</span>
            <h2 id="grade">--</h2>
        </div>
        <div class="card">
            <span>Risk</span>
            <h2 id="risk">--</h2>
        </div>
    </div>

    <!-- PERFECT SIDE BY SIDE -->
    <div class="charts">
        <div class="chart-box">
            <canvas id="chart"></canvas>
        </div>

        <div class="chart-box">
            <canvas id="overallDonut"></canvas>
        </div>
    </div>

    <div id="report"></div>

</div>

<script src="project.js"></script>

</body>
</html>
